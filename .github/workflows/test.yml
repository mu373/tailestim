name: Test tailestim

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - ".github/workflows/release.yml"
      - ".gitignore"
      - ".readthedocs.yaml"
      - "DEVELOP.md"
      - "LICENSE.txt"
      - "README.md"
  pull_request:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - ".github/workflows/release.yml"
      - ".gitignore"
      - ".readthedocs.yaml"
      - "DEVELOP.md"
      - "LICENSE.txt"
      - "README.md"
  workflow_dispatch:

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event_name == 'pull_request' && github.event.pull_request.title || github.event.head_commit.message || '', '[skip ci]') }}
    strategy:
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Checkout tailestimation as subdirectory
        uses: actions/checkout@v6
        with:
          repository: ${{ secrets.TAILESTIMATION_REPO }}
          token: ${{ secrets.TAILESTIMATION_PAT }}
          path: tail-estimation

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          cache-suffix: py${{ matrix.python-version }}

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Run tests
        run: uv run --python ${{ matrix.python-version }} pytest tests
